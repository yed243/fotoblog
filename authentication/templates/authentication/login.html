{% extends 'base.html' %}
{% block content %}
    <h2>Login</h2>
    <p>{{ message }}</p>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Connexion</button>
    </form>
    <div class="link">
        <p>Pas encore de compte? <a href="{% url 'signup' %}">S'inscrire</a></p>
    </div>

{% endblock %}
