{% extends 'base.html' %}
{% block content %}
    <h2>Bienvenue sur FotoBlog</h2>
    <h2>Photo</h2>
    {% for photo in photos %}
        <div>
            <img src="{{ photo.image.url }}" alt="{{ photo.caption }}" width="300">
            <p>{{ photo.caption }}</p>
        </div>
    {% endfor %}
    <p>vous etes connecté</p>
{% endblock %}
