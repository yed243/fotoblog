{% extends 'base.html' %}
{% block content %}
    <div class="container">
        <h1>Bienvenue sur FotoBlog</h1>
        
        <section class="photos-section">
            <h2>Photos</h2>
            <div class="photos-grid">
                {% for photo in photos %}
                    <div class="photo-card">
                        <img src="{{ photo.image.url }}" alt="{{ photo.caption }}" class="photo-image">
                        <p class="photo-caption">{{ photo.caption }}</p>
                    </div>
                {% endfor %}
            </div>
        </section>
        
        <p class="status">✓ Vous êtes connecté</p>
    </div>
    <h2>Blogs</h2>
    <div class="grid-container">
        {% for blog in blogs %}
        <div class="post">
            <a href="{% url 'view_blog' blog.id %}">
                <h4>Billet : {{ blog.title }}</h4>
                <img src="{{ blog.photo.image.url }}" alt="{{ blog.photo.caption }}" class="post-image">
            </a>
        </div>
        {% endfor %}
    </div>
{% endblock %}
